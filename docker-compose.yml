services:
  postgres:
    image: postgres:15
    container_name: rebate-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rebate_management
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: rebate-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/rebate_management?schema=public"
      NEXTAUTH_SECRET: "local-testing-secret"
      NEXTAUTH_URL: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
